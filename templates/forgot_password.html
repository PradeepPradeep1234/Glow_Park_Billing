{% extends 'base.html' %}

{% block title %}Forgot Password – Glow Park{% endblock %}
{% block page_title %}Forgot Password{% endblock %}

{% block content %}

<div class="section-card" style="max-width:480px;margin:auto">

  <div class="section-head">
    <div class="section-title">📧 Reset Your Password</div>
  </div>

  <form method="POST">

    <div style="margin-bottom:18px">

      <label style="font-size:13px;color:var(--gray-light)">
        Enter your registered email
      </label>

      <input
        type="email"
        name="email"
        required
        class="filter-input"
        style="width:100%;margin-top:6px"
        placeholder="example@gmail.com"
      >

      <small style="color:var(--gray-light);font-size:11px">
        We'll send you a password reset link.
      </small>

    </div>

    <button
      type="submit"
      class="btn btn-pink"
      style="width:100%"
    >
      📩 Send Reset Link
    </button>

    <div style="margin-top:16px;text-align:center">

      <a
        href="{{ url_for('login') }}"
        class="btn btn-ghost"
        style="font-size:12px"
      >
        ← Back to Login
      </a>

    </div>

  </form>

</div>

{% endblock %}
