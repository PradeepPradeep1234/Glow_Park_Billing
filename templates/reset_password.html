{% extends 'base.html' %}

{% block title %}Reset Password – Glow Park{% endblock %}
{% block page_title %}Reset Password{% endblock %}

{% block content %}

<div class="section-card" style="max-width:480px;margin:auto">

  <div class="section-head">
    <div class="section-title">🔐 Create New Password</div>
  </div>

  <form method="POST">

    <!-- New Password -->

    <div style="margin-bottom:16px">

      <label style="font-size:13px;color:var(--gray-light)">
        New Password
      </label>

      <input
        type="password"
        name="password"
        required
        minlength="6"
        class="filter-input"
        style="width:100%;margin-top:6px"
        placeholder="Enter new password"
      >

      <small style="color:var(--gray-light);font-size:11px">
        Minimum 6 characters
      </small>

    </div>

    <!-- Confirm Password -->

    <div style="margin-bottom:20px">

      <label style="font-size:13px;color:var(--gray-light)">
        Confirm Password
      </label>

      <input
        type="password"
        name="confirm"
        required
        minlength="6"
        class="filter-input"
        style="width:100%;margin-top:6px"
        placeholder="Re-enter password"
      >

    </div>

    <button
      type="submit"
      class="btn btn-pink"
      style="width:100%"
    >
      🔄 Reset Password
    </button>

  </form>

</div>

{% endblock %}
